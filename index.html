<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <header>
    <div class="logo">
      <h1>Logo</h1>
    </div>
    <div>
      <span>Already have an account? <a href="#">Sing In</a></span>
    </div>
  </header>
  <div class="container">
    <section>
      <div class="google">
        <h1>Let's get started</h1>
        <p>by singin up. I agree to Otakore's <a href="#">Terms & Privacy Policy</a></p>
        <button type="button" id="google" class="btn-google">
          <img src="public/google.svg" alt="Google logo" class="google-log">
          Sign up with Google
        </button>
      </div>
      <div class="horizontal-line">
        <span>Or</span>
      </div>
      <div class="email">
        <form action="">
          <input type="email" placeholder="Enter Email Address">
          <input type="text" placeholder="Enter User name">
          <input type="password" placeholder="Enter Password">
          <input type="password" placeholder="Confirm Password">
          <button class="btn-signup" type="submit">Sign up</button>
        </form>
      </div>
  
    </section>
  </div>
</body>
</html>
